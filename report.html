<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>药师经持诵统计</title>

<style>

body{
    background:#f6efd2;
    font-family:"Microsoft JhengHei",sans-serif;
    padding:30px;
    text-align:center;
}

.container{
    max-width:600px;
    margin:auto;
    background:white;
    padding:30px;
    border-radius:20px;
    box-shadow:0 5px 20px rgba(0,0,0,0.15);
}

h1{
    color:#8C1D18;
}

input{
    width:90%;
    padding:12px;
    margin:10px 0;
    border:1px solid #ccc;
    border-radius:10px;
    font-size:18px;
}

button{
    background:#C9A227;
    color:white;
    border:none;
    padding:15px 30px;
    border-radius:30px;
    font-size:18px;
    cursor:pointer;
}

.total{
    margin-top:30px;
    font-size:24px;
    color:#8C1D18;
    font-weight:bold;
}

</style>
</head>

<body>

<div class="container">

<h1>每日药师经提交</h1>

<input
id="name"
placeholder="请输入姓名">

<input
id="count"
type="number"
placeholder="今日持诵遍数">

<br><br>

<button onclick="submitCount()">
提交
</button>

<div class="total">
累计总遍数：
<span id="total">0</span>
遍
</div>

</div>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/11.9.1/firebase-app.js";

import {
getFirestore,
collection,
addDoc,
getDocs
}
from "https://www.gstatic.com/firebasejs/11.9.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyC1XOCYowWN5TBBMC21asTNAtPuZEnlMPQ",
  authDomain: "anle-yaoshi.firebaseapp.com",
  projectId: "anle-yaoshi",
  storageBucket: "anle-yaoshi.firebasestorage.app",
  messagingSenderId: "732604887983",
  appId: "1:732604887983:web:5d64a37e08b46c2b27b55a"
};

const app = initializeApp(firebaseConfig);

const db = getFirestore(app);

window.submitCount = async function(){

const name =
document.getElementById("name").value;

const count =
Number(document.getElementById("count").value);

if(!name || !count){
alert("请填写完整资料");
return;
}

await addDoc(
collection(db,"chant_records"),
{
name:name,
count:count,
timestamp:new Date()
}
);

alert("提交成功");

document.getElementById("name").value="";
document.getElementById("count").value="";

loadTotal();
}

async function loadTotal(){

const querySnapshot =
await getDocs(collection(db,"chant_records"));

let total = 0;

querySnapshot.forEach((doc)=>{

const data = doc.data();

total += Number(data.count || 0);

});

document.getElementById("total").innerText = total;
}

loadTotal();

</script>

</body>
</html>
